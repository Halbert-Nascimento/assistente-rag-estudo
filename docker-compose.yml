services:
  # OLLAMA - Servidor LLM Local com suporte a GPU NVIDIA
  ollama:
    image: ollama/ollama:latest
    container_name: rag-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama   # volume nomeado "ollama" (igual ao criado pelo comando manual)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: always

  # FASTAPI - Interface React + API RAG
  app:
    build: .
    container_name: rag-app
    ports:
      - "8000:8000"
    volumes:
      # Monta apenas o que muda em runtime (docs, banco vetorial e dados persistidos)
      - ./docs:/app/docs
      - ./chroma_db:/app/chroma_db
      - ./data:/app/data
      # Cache do modelo de embeddings (~470MB) - evita re-download ao recriar o container
      - hf_cache:/root/.cache/huggingface
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.1
      - DOCS_DIR=docs
    depends_on:
      - ollama
    restart: always

volumes:
  ollama:   # reusa o volume criado pelo container standalone (modelos ja baixados)
  hf_cache: # modelo de embeddings persistido entre recriacoes do container
